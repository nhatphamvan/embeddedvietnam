services:

  db:
    image: mysql:8.0
    container_name: embedded_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    # Port 3306 intentionally NOT exposed — use wpcli container to interact
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    command: >
      --innodb_buffer_pool_size=256M
      --innodb_log_file_size=64M
      --max_connections=50
      --performance_schema=OFF

  redis:
    image: redis:7-alpine
    container_name: embedded_redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 80m

  wordpress:
    image: wordpress:php8.1-apache
    container_name: embedded_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:80"
    volumes:
      - .:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WP_DEBUG: ${WP_DEBUG:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    mem_limit: 256m

  wpcli:
    image: wordpress:cli-php8.1
    container_name: embedded_wpcli
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    user: "33:33"
    entrypoint: ["tail", "-f", "/dev/null"]
    mem_limit: 128m

volumes:
  db_data:
